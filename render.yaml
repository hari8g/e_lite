# Render Blueprint: https://render.com/docs/blueprint-spec
# After deploy, set CORS_ORIGINS on the service to your Vercel URL (e.g. https://your-app.vercel.app).
services:
  - type: web
    name: e-lite-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CORS_ORIGINS
        sync: false
